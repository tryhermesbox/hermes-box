#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw

write_files:
  - path: /opt/hermes-agent/docker-compose.yml
    owner: root:root
    permissions: "0644"
    encoding: b64
    content: "{{DOCKER_COMPOSE_YML_B64}}"
  - path: /etc/systemd/system/hermes-agent.service
    owner: root:root
    permissions: "0644"
    encoding: b64
    content: "{{HERMES_SERVICE_B64}}"
  - path: /opt/hermes-agent/.env
    owner: root:root
    permissions: "0600"
    content: |
      HERMES_AGENT_TOKEN={{HERMES_AGENT_TOKEN}}
      HERMES_AGENT_PORT={{HERMES_AGENT_PORT}}
      TZ={{HERMES_AGENT_TIMEZONE}}

runcmd:
  - mkdir -p /opt/hermes-agent/data /opt/hermes-agent/logs
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl daemon-reload
  - systemctl enable hermes-agent.service
  - systemctl start hermes-agent.service
